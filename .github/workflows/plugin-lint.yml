name: Plugin Lint

on:
  push:
  pull_request:

jobs:
  plugin-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run plugin-lint
        # plugin-lint.py exit codes: 0=clean, 1=warnings-only, 2=failures.
        # Warnings (e.g. intentionally quarantined hooks.json.unsupported files)
        # are non-blocking by design — only true failures (exit 2) fail CI.
        run: |
          set +e
          python scripts/plugin-lint.py
          code=$?
          set -e
          echo "plugin-lint exit code: $code (0=clean, 1=warnings-ok, 2=failures-block)"
          [ "$code" -le 1 ]

      - name: Run face-parity gate
        # Dual-navigability gate: README.md / llms.txt / marketplace.json count
        # claims must match disk truth (plugins + skills). Exit 1 blocks — a
        # face that lies about the corpus is a true failure, not a warning.
        run: python scripts/face-parity.py
