name: Validate SKILL.md Frontmatter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        # Single source of truth: the maintained validator in scripts/.
        # It requires name/model/description/category (first-party) or
        # name/description (community) — matching the repo convention.
        # A previous inline copy here diverged and required an abandoned
        # `triggers` field, failing 663/694 skills. Do not re-inline the check.
        run: bash scripts/validate-skills.sh
